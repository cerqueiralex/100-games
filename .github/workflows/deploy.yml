name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate game content
        run: npm run validate

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /100-games/

      # NOTE: no actions/configure-pages here — the workflow token lacks
      # admin rights. The Pages site must be configured once by hand:
      # Settings → Pages → Source: "GitHub Actions", and the github-pages
      # environment must allow deployments from main (see CLAUDE.md).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
